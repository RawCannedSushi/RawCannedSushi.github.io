<!DOCTYPE html>
  <html>
    <head>
      <title>"Coloring The Web"</title>
      <meta charset="UTF-8">
      <meta name="Viewport" content="width=device-width, initial-scale=1.0">
      <meta name="Description" content="Color Scheme Assignment">
      <style>
        table, tr, td, th {
        border: 1px solid black;}
      </style>
     <style> 
      th {
        font-family: 'Times New Roman', serif;
        font-size: 24px;
        font-weight: bold;
        }
      </style>
    </head>
    <body>
      <img src="images/sushi-roll.jpg" alt="An image of a singular sushi roll featuring salmon and avocado">
      <table>
        <tr>
          <th colspan="4" >Sushi Roll</th>
        </tr>
        <tr>
          <td colspan="1", style="background-color:#FFA07A">Light Salmon</td>
          <td colspan="1", style="background-color:#006400">Dark Green</td>
          <td colspan="1", style="background-color:#FFFFF0">Ivory</td>
          <td colspan="1", style="background-color:#2F4F4F">Dark Slate Gray</td>
        </tr>
        <tr>
          <td colspan="1">#FFA07A</td>
          <td colspan="1">#006400</td>
          <td colspan="1">#FFFFF0</td>
          <td colspan="1">#2F4F4F</td>
        </tr>
        <tr>
          <td colspan="1">rgb(255, 160, 122)</td>
          <td colspan="1">rgb(0, 100, 0)</td>
          <td colspan="1">rgb(255, 255, 240)</td>
          <td colspan="1">rgb(47, 79, 79)</td>
        </tr>
        <tr>
          <td colspan="1">hsl(17, 100%, 74%)</td>
          <td colspan="1">hsl(120, 100%, 20%)</td>
          <td colspan="1">hsl(60, 100%, 97%)</td>
          <td colspan="1">hsl(180, 25%, 25%)</td>
        </tr>
      </table>
    </body>
  </html>
